# Set prefix to Ctrl-Space instead of Ctrl-b
unbind C-b
set -g prefix C-Space

# Split windows using | and -
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# Mouse mode
set -g mouse on

# Powerline status line. Resolve the bindings file from the active python
# (pyenv global) instead of pinning a version-specific path — earlier configs
# hardcoded ~/.pyenv/versions/3.11.10/... and broke on every pyenv bump.
# `powerline-status` is installed into the pyenv_global interpreter (see
# libs/data.sh:pip_pkgs).
run-shell "powerline-daemon -q"
run-shell 'tmux source-file "$(python3 -c "import os, powerline; print(os.path.join(os.path.dirname(powerline.__file__), \"bindings/tmux/powerline.conf\"))")"'
